<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Inspector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <header>
      <span class="logo">&#x2316;</span>
      <h1>Request Inspector</h1>
      <button id="settings-btn" class="btn-settings" title="Settings">&#9881;</button>
    </header>

    <!-- Settings panel (hidden by default) -->
    <div id="settings-panel" class="settings-panel hidden">
      <label class="settings-row">
        <span class="settings-label">Monitor (Side Panel)</span>
        <span class="toggle-wrapper">
          <input type="checkbox" id="toggle-side-panel" class="toggle" />
          <span class="toggle-track"></span>
        </span>
      </label>
    </div>

    <!-- Tab bar -->
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="inspector" role="tab"
              aria-selected="true" aria-controls="tab-inspector">Inspector</button>
      <button class="tab" data-tab="profiles" role="tab"
              aria-selected="false" aria-controls="tab-profiles">Profiles</button>
    </nav>

    <!-- ── Inspector tab ── -->
    <div id="tab-inspector" class="tab-panel" role="tabpanel">

      <div class="inspector-left">

        <!-- Origin (read-only) -->
        <section class="field-group">
          <label for="origin-display">Origin</label>
          <input id="origin-display" type="text" class="input-readonly" readonly
                 placeholder="https://example.com" />
        </section>

        <!-- Path editor -->
        <section class="field-group">
          <label for="path-input">Path</label>
          <input id="path-input" type="text" class="input-editable"
                 placeholder="/some/path" spellcheck="false" />
        </section>

        <!-- Sub-tabs -->
        <nav class="subtabs" role="tablist">
          <button class="subtab active" data-subtab="params" role="tab"
                  aria-selected="true">Query Params</button>
          <button class="subtab" data-subtab="headers" role="tab"
                  aria-selected="false">Headers</button>
        </nav>

        <!-- Query Params panel -->
        <div id="subtab-params" class="subtab-panel">
          <section class="params-section">
            <div class="params-header">
              <span class="params-title">Query Parameters</span>
              <button id="add-param-btn" class="btn btn-secondary">+ Add</button>
            </div>
            <div id="params-list" class="params-list">
              <div class="params-empty" id="params-empty">No query parameters</div>
            </div>
          </section>
        </div>

        <!-- Headers panel -->
        <div id="subtab-headers" class="subtab-panel hidden">
          <section class="params-section">
            <div class="params-header">
              <span class="params-title">Request Headers</span>
              <button id="add-header-btn" class="btn btn-secondary">+ Add</button>
            </div>
            <div id="headers-list" class="params-list">
              <div class="params-empty" id="headers-empty">No headers</div>
            </div>
          </section>
        </div>

      </div><!-- /inspector-left -->

      <div class="inspector-right">

        <!-- Live preview -->
        <section class="preview-section">
          <label>New URL</label>
          <div id="url-preview" class="url-preview">—</div>
        </section>

        <!-- Actions -->
        <div class="actions">
          <button id="reset-btn" class="btn btn-ghost">Reset</button>
          <button id="apply-btn" class="btn btn-primary">Apply</button>
        </div>

      </div><!-- /inspector-right -->

    </div><!-- /tab-inspector -->

    <!-- ── Profiles tab ── -->
    <div id="tab-profiles" class="tab-panel hidden" role="tabpanel">

      <!-- Saved profiles list -->
      <section class="profiles-section">
        <div class="params-header">
          <span class="params-title">Saved Profiles</span>
          <button id="create-profile-btn" class="btn btn-secondary">+ New</button>
        </div>
        <div id="create-profile-panel" class="profile-edit-panel hidden"></div>
        <div id="profiles-list" class="profiles-list">
          <div class="params-empty" id="profiles-empty">No saved profiles</div>
        </div>
      </section>

    </div><!-- /tab-profiles -->

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
